name: Test macOS Sandbox

on:
  push:
    branches: [main]
    paths:
      - "tools/agent-sandbox.sh"
      - "tools/macos-sandbox.sh"
      - "tools/macos-sandbox-profile.sb"
      - "tools/test-agent-sandbox.bats"
      - "agents/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/test-macos-sandbox.yml"
  pull_request:
    paths:
      - "tools/agent-sandbox.sh"
      - "tools/macos-sandbox.sh"
      - "tools/macos-sandbox-profile.sb"
      - "tools/test-agent-sandbox.bats"
      - "agents/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/test-macos-sandbox.yml"
  workflow_dispatch:

jobs:
  test:
    name: Test sandbox profile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Launches successfully
        run: bash tools/macos-sandbox.sh /bin/echo "sandbox ok"

      - name: Project dir is writable
        run: |
          bash tools/macos-sandbox.sh /bin/sh -c 'echo ok > "$PWD/sandbox-write-test.txt"'
          rm -f sandbox-write-test.txt

      - name: Home dir is not writable outside allowed paths
        run: |
          set +e
          bash tools/macos-sandbox.sh /bin/sh -c 'echo fail > "$HOME/sandbox-write-test-$$"' 2>/dev/null
          rc=$?
          set -e
          [[ $rc -ne 0 ]] || { echo "FAIL: home dir write succeeded"; exit 1; }
          echo "PASS (exit $rc)"

      - name: SSH keys are not readable
        run: |
          mkdir -p "$HOME/.ssh"
          echo "fake-key" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          set +e
          bash tools/macos-sandbox.sh /bin/sh -c 'cat "$HOME/.ssh/id_rsa"' 2>/dev/null
          rc=$?
          set -e
          [[ $rc -ne 0 ]] || { echo "FAIL: SSH key read succeeded"; exit 1; }
          echo "PASS (exit $rc)"

      - name: GnuPG keys are not readable
        run: |
          mkdir -p "$HOME/.gnupg"
          echo "fake-key" > "$HOME/.gnupg/secring.gpg"
          chmod 600 "$HOME/.gnupg/secring.gpg"
          set +e
          bash tools/macos-sandbox.sh /bin/sh -c 'cat "$HOME/.gnupg/secring.gpg"' 2>/dev/null
          rc=$?
          set -e
          [[ $rc -ne 0 ]] || { echo "FAIL: GnuPG key read succeeded"; exit 1; }
          echo "PASS (exit $rc)"

      - name: Arbitrary home file is not readable
        run: |
          echo "secret" > "$HOME/sandbox-secret-$$.txt"
          secret_file="$HOME/sandbox-secret-$$.txt"
          set +e
          out=$(bash tools/macos-sandbox.sh /bin/sh -c "cat '$secret_file'" 2>/dev/null)
          rc=$?
          set -e
          rm -f "$secret_file"
          [[ $rc -ne 0 ]] || { echo "FAIL: home file was readable (rc=$rc, out=$out)"; exit 1; }
          echo "PASS (exit $rc)"

  test-nix:
    name: Test sandbox via agent-sandbox.sh with Nix
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Basic command execution
        run: bash tools/agent-sandbox.sh echo "Hello from sandbox"

      - name: Project directory is writable
        run: |
          bash tools/agent-sandbox.sh touch test-file.txt
          bash tools/agent-sandbox.sh rm test-file.txt

      - name: Home directory is not writable outside allowed paths
        run: |
          set +e
          bash tools/agent-sandbox.sh touch "$HOME/Documents/sandbox-test.txt" 2>/dev/null
          rc=$?
          set -e
          [[ $rc -ne 0 ]] || { echo "FAIL: should not be able to write to ~/Documents"; exit 1; }
          echo "PASS (exit $rc)"

      - name: Agent config directories are writable
        run: |
          mkdir -p ~/.config/opencode ~/.claude
          bash tools/agent-sandbox.sh touch ~/.config/opencode/test.txt
          bash tools/agent-sandbox.sh rm ~/.config/opencode/test.txt
          bash tools/agent-sandbox.sh touch ~/.claude/test.txt
          bash tools/agent-sandbox.sh rm ~/.claude/test.txt

      - name: Workspace directory is accessible
        run: bash tools/agent-sandbox.sh bash -c 'touch "$AGENT_WORK_DIR/test.txt"'

      - name: Nix store is readable
        run: |
          mkdir -p ~/.cache/nix
          bash tools/agent-sandbox.sh nix run nixpkgs#hello

      - name: SANDBOX_EXTRA_RW grants write access to extra paths
        run: |
          mkdir -p /tmp/extra-test-dir
          echo "test content" > /tmp/extra-test-dir/test.txt
          SANDBOX_EXTRA_RW="/tmp/extra-test-dir" bash tools/agent-sandbox.sh cat /tmp/extra-test-dir/test.txt
          rm -rf /tmp/extra-test-dir

      - name: IN_AGENT_SANDBOX is set inside sandbox
        run: |
          bash tools/agent-sandbox.sh bash -c '[[ "$IN_AGENT_SANDBOX" == "1" ]] || { echo "FAIL: IN_AGENT_SANDBOX not set"; exit 1; }'

  test-flake:
    name: Test nix develop .#opencode on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Run sandbox tests
        run: nix develop .#default --command bats tools/test-agent-sandbox.bats
