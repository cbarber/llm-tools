name: Test macOS Sandbox

on:
  push:
    branches: [main]
    paths:
      - "tools/agent-sandbox.sh"
      - "tools/macos-sandbox.sh"
      - "tools/macos-sandbox-profile.sb"
      - "tools/test-agent-sandbox.bats"
      - "agents/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/test-macos-sandbox.yml"
  pull_request:
    paths:
      - "tools/agent-sandbox.sh"
      - "tools/macos-sandbox.sh"
      - "tools/macos-sandbox-profile.sb"
      - "tools/test-agent-sandbox.bats"
      - "agents/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/test-macos-sandbox.yml"
  workflow_dispatch:

jobs:
  test-flake:
    name: Test nix develop .#opencode on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v21

      - name: Run sandbox tests
        run: nix develop .#default --command bats tools/test-agent-sandbox.bats
