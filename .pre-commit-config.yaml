repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        language: system
        entry: bash tools/check-shell-scripts.sh --staged
        pass_filenames: false
        types: [shell]

      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint-cli2
        types: [markdown]

      - id: nixfmt
        name: nixfmt
        language: system
        entry: nixfmt
        types: [file]
        files: \.nix$
