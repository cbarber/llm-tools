repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck --severity=error
        types: [shell]

      - id: markdownlint
        name: markdownlint
        language: system
        entry: markdownlint-cli2
        types: [markdown]

      - id: nixfmt
        name: nixfmt
        language: system
        entry: nixfmt
        types: [file]
        files: \.nix$

      - id: bun-test
        name: bun test
        language: system
        entry: bash -c "bun install --cwd tests --frozen-lockfile && bun test ./tests"
        pass_filenames: false
        files: ^(tests/|agents/opencode/plugins/temper\.ts|overlays/default\.nix|flake\.lock)
