repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        language: system
        entry: bash tools/check-shell-scripts.sh --staged
        pass_filenames: false
        types: [shell]

      - id: sandbox-tests
        name: sandbox tests
        language: system
        entry: bash tools/test-agent-sandbox.sh
        pass_filenames: false
        always_run: true
